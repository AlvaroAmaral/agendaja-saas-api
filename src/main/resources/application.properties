# Configuracoees de Conexao (Dinamicas)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/agendaja_db}
spring.datasource.username=${DB_USER:alvaro}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuracao Documentacao
springdoc.swagger-ui.path=/swagger-ui.html

